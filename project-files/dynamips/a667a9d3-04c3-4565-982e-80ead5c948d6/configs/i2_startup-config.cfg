!
!
enable
hostname R2
!
no ip domain-lookup
ip routing
!
interface Loopback0
 ip address 10.0.0.2 255.255.255.255
 ip ospf 1 area 0
 no shutdown
exit
!
interface GigabitEthernet1/0
 ip address 145.0.1.2 255.255.255.0
 ip ospf 1 area 0
 mpls ip
 no shutdown
exit
!
interface GigabitEthernet2/0
 ip address 145.0.2.1 255.255.255.0
 ip ospf 1 area 0
 mpls ip
 no shutdown
exit
!
router ospf 1
 router-id 2.2.2.2
 log-adjacency-changes
exit
!
mpls ip
!
mpls ldp router-id Loopback0 force
!
router bgp 64500
 bgp router-id 2.2.2.2
 bgp log-neighbor-changes
 no auto-summary
 no synchronization
 neighbor 10.0.0.1 remote-as 64500
 neighbor 10.0.0.1 update-source Loopback0
 neighbor 10.0.0.1 route-reflector-client
 neighbor 10.0.0.3 remote-as 64500
 neighbor 10.0.0.3 update-source Loopback0
 neighbor 10.0.0.3 route-reflector-client
 neighbor 10.0.0.4 remote-as 64500
 neighbor 10.0.0.4 update-source Loopback0
 neighbor 10.0.0.4 route-reflector-client
 bgp cluster-id 2.2.2.2
 !
 address-family vpnv4
  neighbor 10.0.0.1 activate
  neighbor 10.0.0.1 send-community extended
  neighbor 10.0.0.1 route-reflector-client
  neighbor 10.0.0.3 activate
  neighbor 10.0.0.3 send-community extended
  neighbor 10.0.0.3 route-reflector-client
  neighbor 10.0.0.4 activate
  neighbor 10.0.0.4 send-community extended
  neighbor 10.0.0.4 route-reflector-client
 exit-address-family
!
exit
!
end
!
