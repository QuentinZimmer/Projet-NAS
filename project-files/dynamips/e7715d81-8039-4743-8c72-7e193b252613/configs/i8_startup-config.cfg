!
!
enable
hostname R8
!
no ip domain-lookup
ip routing
!
interface Loopback0
 ip address 192.168.4.1 255.255.255.255
 no shutdown
exit
!
interface GigabitEthernet1/0
 ip address 145.0.6.2 255.255.255.0
 no shutdown
exit
!
router bgp 65004
 bgp router-id 8.8.8.8
 bgp log-neighbor-changes
 no auto-summary
 no synchronization
 neighbor 145.0.6.1 remote-as 64500
 !
 address-family ipv4
  neighbor 145.0.6.1 activate
  network 192.168.4.1 mask 255.255.255.255
 exit-address-family
exit
!
end
!
