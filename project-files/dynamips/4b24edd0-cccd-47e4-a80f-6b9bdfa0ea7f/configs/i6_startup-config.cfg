!
!
!
!
!
!
!
!
enable
hostname R6
!
no ip domain-lookup
ip routing
!
interface Loopback0
 ip address 192.168.2.1 255.255.255.255
 no shutdown
exit
!
interface GigabitEthernet1/0
 ip address 145.0.4.2 255.255.255.0
 no shutdown
exit
!
router bgp 65002
 bgp router-id 6.6.6.6
 bgp log-neighbor-changes
 no auto-summary
 no synchronization
 neighbor 145.0.4.1 remote-as 64500
 !
 address-family ipv4
  neighbor 145.0.4.1 activate
  network 192.168.2.1 mask 255.255.255.255
 exit-address-family
exit
!
end
!
