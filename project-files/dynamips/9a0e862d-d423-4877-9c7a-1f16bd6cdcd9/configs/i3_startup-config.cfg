!
!
enable
hostname R3
!
no ip domain-lookup
ip routing
!
interface Loopback0
 ip address 10.0.0.3 255.255.255.255
 ip ospf 1 area 0
 no shutdown
exit
!
interface GigabitEthernet1/0
 ip address 145.0.2.2 255.255.255.0
 ip ospf 1 area 0
 mpls ip
 no shutdown
exit
!
interface GigabitEthernet2/0
 ip address 145.0.3.1 255.255.255.0
 ip ospf 1 area 0
 mpls ip
 no shutdown
exit
!
router ospf 1
 router-id 3.3.3.3
 log-adjacency-changes
exit
!
mpls ip
!
mpls ldp router-id Loopback0 force
!
router bgp 64500
 bgp router-id 3.3.3.3
 bgp log-neighbor-changes
 no auto-summary
 no synchronization
 neighbor 10.0.0.2 remote-as 64500
 neighbor 10.0.0.2 update-source Loopback0
 !
 address-family vpnv4
  neighbor 10.0.0.2 activate
  neighbor 10.0.0.2 send-community extended
 exit-address-family
!
exit
!
end
!
