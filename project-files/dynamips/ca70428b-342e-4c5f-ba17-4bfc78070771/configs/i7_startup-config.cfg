!
!
enable
hostname R7
!
no ip domain-lookup
ip routing
!
interface Loopback0
 ip address 192.168.3.1 255.255.255.255
 no shutdown
exit
!
interface GigabitEthernet1/0
 ip address 145.0.7.2 255.255.255.0
 no shutdown
exit
!
router bgp 65003
 bgp router-id 7.7.7.7
 bgp log-neighbor-changes
 no auto-summary
 no synchronization
 neighbor 145.0.7.1 remote-as 64500
 !
 address-family ipv4
  neighbor 145.0.7.1 activate
  network 192.168.3.1 mask 255.255.255.255
 exit-address-family
exit
!
end
!
