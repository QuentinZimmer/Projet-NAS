!
enable
conf terminal
hostname R4
!
no ip domain-lookup
ip routing
!
interface Loopback0
 ip address 10.0.0.4 255.255.255.255
 no shutdown
exit
!
interface GigabitEthernet1/0
 ip address 145.0.3.2 255.255.255.0
 ip ospf 1 area 0
 mpls ip
 no shutdown
exit
!
interface GigabitEthernet2/0
 ip address 145.0.5.1 255.255.255.0
 no shutdown
exit
!
router ospf 1
 router-id 4.4.4.4
 log-adjacency-changes
exit
!
mpls ip
!
mpls ldp router-id Loopback0 force
!
router bgp 64500
 bgp router-id 4.4.4.4
 bgp log-neighbor-changes
 no auto-summary
 no synchronization
 neighbor 10.0.0.1 remote-as 64500
 neighbor 10.0.0.1 update-source Loopback0
 neighbor 145.0.5.2 remote-as 65001
 !
 address-family ipv4
  neighbor 10.0.0.1 activate
  neighbor 10.0.0.1 next-hop-self
  neighbor 145.0.5.2 activate
  network 10.0.0.4 mask 255.255.255.255
  network 145.0.5.0 mask 255.255.255.0
 exit-address-family
exit
!
end
!
