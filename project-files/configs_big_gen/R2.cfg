!
enable
conf terminal
hostname R2
!
no ip domain-lookup
ip routing
!
interface Loopback0
 ip address 10.0.0.2 255.255.255.255
 no shutdown
exit
!
interface GigabitEthernet1/0
 ip address 145.0.1.2 255.255.255.0
 ip ospf 1 area 0
 mpls ip
 no shutdown
exit
!
interface GigabitEthernet2/0
 ip address 145.0.2.1 255.255.255.0
 ip ospf 1 area 0
 mpls ip
 no shutdown
exit
!
router ospf 1
 router-id 2.2.2.2
 log-adjacency-changes
exit
!
mpls ip
!
mpls ldp router-id Loopback0 force
!
router bgp 64500
 bgp router-id 2.2.2.2
 bgp log-neighbor-changes
 no auto-summary
 no synchronization
 !
 address-family ipv4
 exit-address-family
exit
!
end
!
