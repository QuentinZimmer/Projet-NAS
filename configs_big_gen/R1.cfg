!
enable
hostname R1
!
no ip domain-lookup
ip routing
!
interface Loopback0
 ip address 10.0.0.1 255.255.255.255
 ip ospf 1 area 0
 no shutdown
exit
!
ip vrf CLIENT_A
 rd 64500:106
 route-target export 64500:101
 route-target import 64500:101
exit
!
ip vrf CLIENT_B
 rd 64500:108
 route-target export 64500:102
 route-target import 64500:102
exit
!
interface GigabitEthernet1/0
 ip address 145.0.1.1 255.255.255.0
 ip ospf 1 area 0
 mpls ip
 no shutdown
exit
!
interface GigabitEthernet2/0
 ip vrf forwarding CLIENT_A
 ip address 145.0.4.1 255.255.255.0
 no shutdown
exit
!
interface GigabitEthernet3/0
 ip vrf forwarding CLIENT_B
 ip address 145.0.6.1 255.255.255.0
 no shutdown
exit
!
router ospf 1
 router-id 1.1.1.1
 log-adjacency-changes
exit
!
mpls ip
!
mpls ldp router-id Loopback0 force
!
router bgp 64500
 bgp router-id 1.1.1.1
 bgp log-neighbor-changes
 no auto-summary
 no synchronization
 neighbor 10.0.0.2 remote-as 64500
 neighbor 10.0.0.2 update-source Loopback0
 !
 address-family vpnv4
  neighbor 10.0.0.2 activate
  neighbor 10.0.0.2 send-community extended
 exit-address-family
!
 address-family ipv4 vrf CLIENT_A
  redistribute connected
  neighbor 145.0.4.2 remote-as 65002
  neighbor 145.0.4.2 activate
 exit-address-family
!
 address-family ipv4 vrf CLIENT_B
  redistribute connected
  neighbor 145.0.6.2 remote-as 65004
  neighbor 145.0.6.2 activate
 exit-address-family
!
exit
!
end
!
